<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahishmati Chat</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b141a;
    color:white;
}

header{
    background:#202c33;
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

#welcome{
    text-align:center;
    margin-top:20px;
    font-size:20px;
}

#chat-container{
    width:90%;
    max-width:800px;
    margin:20px auto;
}

#messages{
    height:400px;
    overflow-y:auto;
    border:1px solid #444;
    padding:10px;
    background:#111b21;
}

.message{
    margin-bottom:10px;
    padding:8px;
    border-radius:8px;
    max-width:70%;
    word-wrap:break-word;
    cursor:pointer;
}

.my-message{
    background:#005c4b;
    margin-left:auto;
    text-align:left;
    position:relative;
}

.my-message::after{
    content:"";
    position:absolute;
    right:-10px;
    top:10px;
    border-left:10px solid #005c4b;
    border-top:10px solid transparent;
    border-bottom:10px solid transparent;
}

.other-message{
    background:#202c33;
    margin-right:auto;
    position:relative;
}

.other-message::before{
    content:"";
    position:absolute;
    left:-10px;
    top:10px;
    border-right:10px solid #202c33;
    border-top:10px solid transparent;
    border-bottom:10px solid transparent;
}

.reply-preview{
    background:#111b21;
    padding:6px;
    border-left:3px solid #25D366;
    margin-bottom:6px;
    font-size:13px;
    border-radius:5px;
    color:#ddd;
}

.time{
    font-size:12px;
    color:#aaa;
}

#form{
    display:flex;
    margin-top:10px;
}

#msg{
    flex:1;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>🏰 Welcome To Mahishmati</header>

<div style="text-align:center;margin-top:10px;">
    <button onclick="logout()">Logout</button>
</div>

<div id="admin-panel" style="text-align:center;margin-top:10px;display:none;">
    <button onclick="createInvite()">Create Invite Link</button>
    <button onclick="clearChat()">Clear Chat</button>
    <p id="invite-link"></p>
</div>

<div id="welcome"></div>

<div id="online-box" style="
width:90%;
max-width:800px;
margin:10px auto;
padding:10px;
background:#222;
border-radius:10px;
">
    <b>🟢 Online Users:</b>
    <div id="online-users">No Users Online</div>
</div>

<div id="chat-container">

    <div id="messages"></div>

    <div id="typing" style="
    padding:5px;
    color:#25D366;
    font-size:14px;
    "></div>

    <div id="reply-box" style="
    display:none;
    background:#202c33;
    border-left:4px solid #25D366;
    padding:8px 35px 8px 8px;
    margin-top:8px;
    border-radius:6px;
    position:relative;
    ">
        <span id="reply-text"></span>
        <button type="button" onclick="cancelReply()" style="
        position:absolute;
        right:5px;
        top:5px;
        ">×</button>
    </div>

    <form id="form">
        <input id="msg" autocomplete="off" placeholder="Type message...">
        <button type="submit">Send</button>
    </form>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "/login.html";
}

const user = JSON.parse(localStorage.getItem("user"));

if(user){
    document.getElementById("welcome").innerHTML =
        `Welcome To Mahishmati, <b>${user.name}</b>`;
}

if(user && user.role === "admin"){
    document.getElementById("admin-panel").style.display = "block";
}

const socket = io();

socket.on("connect", () => {
    console.log("Socket Connected");

    if(user && user.name){
        socket.emit("user-online", user.name);
    }
});

const form = document.getElementById("form");
const input = document.getElementById("msg");
const messages = document.getElementById("messages");
const typingDiv = document.getElementById("typing");

let replyingTo = null;

input.addEventListener("input", () => {
    if(user && user.name){
        socket.emit("typing", user.name);
    }
});

function getReplyHTML(replyTo){
    if(!replyTo){
        return "";
    }

    return `
        <div class="reply-preview">
            <b>${replyTo.sender}</b><br>
            ${replyTo.text}
        </div>
    `;
}

async function loadMessages() {

    const res = await fetch("/api/messages");
    const oldMessages = await res.json();

    messages.innerHTML = "";

    oldMessages.forEach((data) => {

        const item = document.createElement("div");

        item.classList.add("message");

        if(data.sender === user.name){
            item.classList.add("my-message");
        }
        else{
            item.classList.add("other-message");
        }

        let editButton = "";

        if(data.sender === user.name){
            editButton = `
                <button onclick="event.stopPropagation(); editMessage('${data._id}')">
                    Edit
                </button>
            `;
        }

        item.innerHTML = `
            ${getReplyHTML(data.replyTo)}

            <b>${data.sender}</b><br>
            ${data.text}

            <div class="time">
                ${data.time}
                ${data.edited ? " ✏️ Edited" : ""}
                ${data.seen ? " ✓✓" : " ✓"}
            </div>

            ${editButton}
        `;

        item.addEventListener("click", () => {
            replyMessage(data.sender, data.text);
        });

        messages.appendChild(item);
    });

    messages.scrollTop = messages.scrollHeight;
}

form.addEventListener("submit", function(e){
    e.preventDefault();

    if(input.value.trim() === ""){
        return;
    }

    const data = {
        user: user.name,
        message: input.value,
        time: new Date().toLocaleTimeString(),
        replyTo: replyingTo
    };

    socket.emit("chat-message", data);

    input.value = "";
    cancelReply();
});

socket.on("chat-message", (data)=>{

    const item = document.createElement("div");

    item.classList.add("message");

    if(data.sender === user.name){
        item.classList.add("my-message");
    }
    else{
        item.classList.add("other-message");
    }

    item.innerHTML = `
        ${getReplyHTML(data.replyTo)}

        <b>${data.sender}</b><br>
        ${data.text}

        <div class="time">
            ${data.time}
            ${data.seen ? " ✓✓" : " ✓"}
        </div>
    `;

    item.addEventListener("click", () => {
        replyMessage(data.sender, data.text);
    });

    messages.appendChild(item);
    messages.scrollTop = messages.scrollHeight;

    if(data.sender !== user.name){
        socket.emit("message-seen", data._id);
    }
});

socket.on("online-users", (users) => {
    const cleanUsers = users.filter(u => u);

    document.getElementById("online-users").innerHTML =
        cleanUsers.length > 0
        ? cleanUsers.join("<br>")
        : "No Users Online";
});

socket.on("typing", (username) => {
    typingDiv.innerText = `${username} is typing...`;

    clearTimeout(window.typingTimeout);

    window.typingTimeout = setTimeout(() => {
        typingDiv.innerText = "";
    }, 2000);
});

socket.on("message-updated", () => {
    loadMessages();
});

socket.on("chat-cleared", () => {
    messages.innerHTML = "";
});

socket.on("message-seen-update", () => {
    loadMessages();
});

loadMessages();

async function editMessage(id){

    const newText = prompt("Edit your message:");

    if(!newText){
        return;
    }

    await fetch(`/api/messages/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            text: newText
        })
    });
}

function replyMessage(sender, text){

    replyingTo = {
        sender,
        text
    };

    document.getElementById("reply-box").style.display = "block";

    document.getElementById("reply-text").innerHTML =
        `<b>Replying to ${sender}</b><br>${text}`;

    input.focus();
}

function cancelReply(){

    replyingTo = null;

    document.getElementById("reply-box").style.display = "none";
    document.getElementById("reply-text").innerHTML = "";
}

async function createInvite(){

    const res = await fetch("/api/create-invite",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            role:user.role
        })
    });

    const data = await res.json();

    document.getElementById("invite-link").innerText = data.link;
}

async function clearChat(){

    if(!confirm("Clear all chats?")){
        return;
    }

    const res = await fetch("/api/messages", {
        method: "DELETE",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            role: user.role
        })
    });

    const data = await res.json();

    alert(data.message);
}

function logout(){

    localStorage.removeItem("token");
    localStorage.removeItem("user");

    window.location.href = "/login.html";
}
</script>

</body>
</html>
